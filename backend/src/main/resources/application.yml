server:
  port: 8080

spring:
  application:
    name: rapp-tycoon-backend
  datasource:
    url: jdbc:mysql://localhost:3306/rapptycoon
    username: rapptycoon
    password: rapptycoon
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# WebSocket
websocket:
  endpoint: /ws/game
  allowed-origins: "*"

# Game configuration
game:
  tick:
    interval: 5000
    total: 60
  players:
    min: 2
    max: 6
  basestations:
    per-player: 3
  score:
    weight:
      money: 0.30
      satisfaction: 0.35
      stability: 0.35
  events:
    base-rate: 0.3
    player-multiplier: 0.2
  escalation:
    max-level: 3
    auto-resolve-after: 5
  rapp:
    deployment-ticks: 1
    resolve-ticks: 1

# Logging
logging:
  level:
    root: INFO
    com.rapptycoon: DEBUG
